</head>
<body>

<header>
<div class="nav">
  <div class="logo">
    <img src="logo.png" alt="Paws & Wings logo">
    <h2>Paws & Wings</h2>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>

<h1 class="center">Support Animal Welfare</h1>

<form class="donateForm">
  <label>Name</label>
  <input type="text" placeholder="Name" required>
  <label>Amount</label>
  <input type="number" placeholder="Amount" required>
  <label>Message</label>
  <textarea placeholder="Message"></textarea>
  <button class="btn" type="submit">Donate</button>
</form>

<div class="qr-section center">
  <p>Scan to donate instantly:</p>
  <div class="qr-box">
    <img src="Qr-donate.jpeg" alt="Scan QR code to donate" class="qr-code">
    <p><small>Use any UPI/Bank app to scan</small></p>
  </div>
</div>

</body>
</html>
